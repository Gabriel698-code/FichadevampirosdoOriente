<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vampiros do Oriente - Ficha</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header>
        <h1>Vampiros do Oriente</h1>
        <p>Ficha de Personagem</p>
    </header>

    <!-- INFORMAÇÕES -->
    <section>
        <h2>Informações</h2>

        <div class="grid-3">
            <div>
                <label>Nome</label>
                <input type="text" id="nome">
            </div>

            <div>
                <label>Jogador</label>
                <input type="text" id="jogador">
            </div>

            <div>
                <label>Crônica</label>
                <input type="text" id="cronica">
            </div>

            <div>
                <label>Natureza</label>
                <input type="text" id="natureza">
            </div>

            <div>
                <label>Comportamento</label>
                <input type="text" id="comportamento">
            </div>

            <div>
                <label>Natureza do P.</label>
                <input type="text" id="naturezaP">
            </div>

            <div>
                <label>Equilíbrio</label>
                <input type="text" id="equilibrio">
            </div>

            <div>
                <label>Direção</label>
                <input type="text" id="direcao">
            </div>

            <div>
                <label>Wu</label>
                <input type="text" id="wu">
            </div>
        </div>
    </section>

    <!-- ATRIBUTOS -->
    <section>
        <h2>Atributos</h2>

        <div class="atributos">

            <div>
                <h3>Físicos</h3>

                <label>Força</label>
                <input type="number" min="0" max="10">

                <label>Destreza</label>
                <input type="number" min="0" max="10">

                <label>Vigor</label>
                <input type="number" min="0" max="10">
            </div>

            <div>
                <h3>Sociais</h3>

                <label>Carisma</label>
                <input type="number" min="0" max="10">

                <label>Manipulação</label>
                <input type="number" min="0" max="10">

                <label>Aparência</label>
                <input type="number" min="0" max="10">
            </div>

            <div>
                <h3>Mentais</h3>

                <label>Percepção</label>
                <input type="number" min="0" max="10">

                <label>Inteligência</label>
                <input type="number" min="0" max="10">

                <label>Raciocínio</label>
                <input type="number" min="0" max="10">
            </div>

        </div>
    </section>

    <!-- HABILIDADES -->
    <section>
        <h2>Habilidades</h2>

        <div class="atributos">

            <div>
                <h3>Talentos</h3>

                <label>Prontidão</label><input type="number" min="0" max="10">
                <label>Esportes</label><input type="number" min="0" max="10">
                <label>Briga</label><input type="number" min="0" max="10">
                <label>Esquiva</label><input type="number" min="0" max="10">
                <label>Empatia</label><input type="number" min="0" max="10">
                <label>Expressão</label><input type="number" min="0" max="10">
                <label>Intimidação</label><input type="number" min="0" max="10">
                <label>Liderança</label><input type="number" min="0" max="10">
                <label>Manha</label><input type="number" min="0" max="10">
                <label>Lábia</label><input type="number" min="0" max="10">
            </div>

            <div>
                <h3>Perícias</h3>

                <label>Empatia com Animais</label><input type="number" min="0" max="10">
                <label>Ofícios</label><input type="number" min="0" max="10">
                <label>Condução</label><input type="number" min="0" max="10">
                <label>Etiqueta</label><input type="number" min="0" max="10">
                <label>Armas de Fogo</label><input type="number" min="0" max="10">
                <label>Armas Brancas</label><input type="number" min="0" max="10">
                <label>Artes Marciais</label><input type="number" min="0" max="10">
                <label>Segurança</label><input type="number" min="0" max="10">
                <label>Furtividade</label><input type="number" min="0" max="10">
                <label>Sobrevivência</label><input type="number" min="0" max="10">
            </div>

            <div>
                <h3>Conhecimentos</h3>

                <label>Acadêmicos</label><input type="number" min="0" max="10">
                <label>Computador</label><input type="number" min="0" max="10">
                <label>Finanças</label><input type="number" min="0" max="10">
                <label>Investigação</label><input type="number" min="0" max="10">
                <label>Direito</label><input type="number" min="0" max="10">
                <label>Linguística</label><input type="number" min="0" max="10">
                <label>Medicina</label><input type="number" min="0" max="10">
                <label>Ocultismo</label><input type="number" min="0" max="10">
                <label>Rituais</label><input type="number" min="0" max="10">
                <label>Ciências</label><input type="number" min="0" max="10">
            </div>

        </div>
    </section>

    <!-- VANTAGENS -->
    <section>
        <h2>Vantagens</h2>

        <h3>Antecedentes</h3>
        <textarea rows="6"></textarea>

        <h3>Disciplinas</h3>
        <textarea rows="6"></textarea>

        <div class="grid-2">

            <div>
                <label>Chi Yin</label>
                <input type="number" min="0" max="10">
            </div>

            <div>
                <label>Chi Yang</label>
                <input type="number" min="0" max="10">
            </div>

        </div>
    </section>

    <!-- DARMA -->
    <section>
        <h2>Darma</h2>

        <div class="grid-2">

            <div>
                <label>Darma</label>
                <input type="number" min="0" max="10">
            </div>

            <div>
                <label>Força de Vontade</label>
                <input type="number" min="0" max="10">
            </div>

            <div>
                <label>Hun</label>
                <input type="number" min="0" max="10">
            </div>

            <div>
                <label>Po</label>
                <input type="number" min="0" max="10">
            </div>

            <div>
                <label>Chi Demoníaco</label>
                <input type="number" min="0" max="10">
            </div>

        </div>
    </section>

    <!-- QUALIDADES -->
    <section>
        <h2>Qualidades e Defeitos</h2>
        <textarea rows="8"></textarea>
    </section>

    <!-- EQUILIBRIO -->
    <section>
        <h2>Equilíbrio</h2>
        <textarea rows="8"></textarea>
    </section>

    <!-- RITUAIS -->
    <section>
        <h2>Rituais</h2>
        <textarea rows="8"></textarea>
    </section>

    <!-- VITALIDADE -->
    <section>
        <h2>Vitalidade</h2>

        <label><input type="checkbox"> Escoriado</label>
        <label><input type="checkbox"> Machucado</label>
        <label><input type="checkbox"> Ferido</label>
        <label><input type="checkbox"> Ferido Gravemente</label>
        <label><input type="checkbox"> Espancado</label>
        <label><input type="checkbox"> Aleijado</label>
        <label><input type="checkbox"> Incapacitado</label>
    </section>

    <!-- COMBATE -->
    <section>
        <h2>Combate</h2>

        <table>
            <thead>
                <tr>
                    <th>Arma</th>
                    <th>D.F</th>
                    <th>D.N</th>
                </tr>
            </thead>

            <tbody>

                <tr>
                    <td><input type="text"></td>
                    <td><input type="text"></td>
                    <td><input type="text"></td>
                </tr>

                <tr>
                    <td><input type="text"></td>
                    <td><input type="text"></td>
                    <td><input type="text"></td>
                </tr>

                <tr>
                    <td><input type="text"></td>
                    <td><input type="text"></td>
                    <td><input type="text"></td>
                </tr>

            </tbody>
        </table>
    </section>

    <section class="acoes">
        <button id="salvarFicha">Salvar Ficha</button>
        <button id="carregarFicha">Carregar Ficha</button>
        <button id="exportarPDF">Exportar PDF</button>
    </section>

</div>

<script src="script.js"></script>
</body>
</html>
